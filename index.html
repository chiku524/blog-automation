<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dev Log – Public Blog</title>
  <meta name="description" content="Weekly dev digests from GitHub activity. Professional, intelligent, and humorous.">
  <link rel="alternate" type="application/rss+xml" title="Dev Log RSS" href="/api/feed" id="rss-link">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0c;
      --surface: #121214;
      --surface-hover: #1a1a1e;
      --border: #27272a;
      --text: #fafafa;
      --text-muted: #71717a;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --success: #22c55e;
      --error: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.65;
    }
    .container { max-width: 960px; margin: 0 auto; padding: 3rem 1.5rem; }
    header {
      margin-bottom: 2rem;
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
    }
    h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; }
    .subtitle { color: var(--text-muted); font-size: 0.95rem; margin-top: 0.25rem; }
    .nav { display: flex; gap: 1rem; align-items: center; font-size: 0.9rem; }
    .nav a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav a:hover { color: var(--accent); }
    .nav .rss { font-size: 0.85rem; }
    .feed-select { display: flex; align-items: center; gap: 0.5rem; }
    .feed-label { color: var(--text-muted); font-size: 0.9rem; }
    .feed-select select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 0.35rem 0.6rem;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .feeds-section { margin-bottom: 2.5rem; }
    .feeds-section h2 {
      font-size: 0.85rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }
    .feeds-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1rem;
    }
    .feed-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      aspect-ratio: 1;
      min-height: 120px;
      padding: 1rem;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 14px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    .feed-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .feed-card .feed-name {
      font-weight: 600;
      font-size: 0.9rem;
      text-align: center;
      line-height: 1.3;
    }
    .feed-card .feed-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.35rem; }

    .posts-section h2 {
      font-size: 0.85rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }
    .posts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }
    .blog-card {
      display: flex;
      flex-direction: column;
      aspect-ratio: 1;
      min-height: 160px;
      padding: 1.25rem;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 14px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    .blog-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .blog-card .title {
      font-weight: 600;
      font-size: 0.95rem;
      line-height: 1.35;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .blog-card .date {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      margin-top: 0.5rem;
    }
    .blog-card .feed-tag {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-top: 0.5rem;
      opacity: 0.85;
    }
    .blog-card[data-feed] { border-left-width: 4px; }
    .loading, .error, .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }
    .error { color: var(--error); }
    .empty { font-style: italic; }
    footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.875rem;
      color: var(--text-muted);
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
    }
    footer a { color: var(--text-muted); text-decoration: none; }
    footer a:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>Dev Log</h1>
        <p class="subtitle">Weekly dev digests from GitHub activity. Professional, intelligent, humorous.</p>
      </div>
      <nav class="nav">
        <label class="feed-select">
          <span class="feed-label">Feed:</span>
          <select id="feed-select" title="Filter by feed">
            <option value="">All feeds</option>
          </select>
        </label>
        <a href="/api/feed" class="rss" id="rss-anchor" title="RSS Feed">RSS</a>
      </nav>
    </header>
    <section class="feeds-section" id="feeds-section">
      <h2>Feeds</h2>
      <div class="feeds-grid" id="feeds-grid"></div>
    </section>
    <section class="posts-section">
      <h2 id="posts-heading">Posts</h2>
      <div id="content">
        <div class="loading">Loading posts…</div>
      </div>
    </section>
    <footer>
      <a href="/api/feed">RSS Feed</a>
      <span>·</span>
      <span>Powered by GitHub + Notion + OpenAI</span>
    </footer>
  </div>
  <script>
    const base = () => window.location.origin;
    const feedFromUrl = () => (new URLSearchParams(window.location.search).get('feed') || '').trim();
    const feed = () => document.getElementById('feed-select')?.value || '';
    function getCurrentFeed() { return feedFromUrl() || feed(); }

    const FEED_COLORS = [
      '#6366f1', '#22c55e', '#f59e0b', '#ec4899', '#14b8a6',
      '#8b5cf6', '#ef4444', '#3b82f6', '#eab308', '#06b6d4',
      '#84cc16', '#f97316'
    ];
    function colorForFeed(feedSlug, index) {
      if (!feedSlug) return FEED_COLORS[0];
      const i = typeof index === 'number' ? index : (feedSlug.split('').reduce((a, c) => a + c.charCodeAt(0), 0) % FEED_COLORS.length);
      return FEED_COLORS[Math.abs(i) % FEED_COLORS.length];
    }

    async function load() {
      const el = document.getElementById('content');
      const heading = document.getElementById('posts-heading');
      try {
        const res = await fetch(base() + '/api/blogs' + (getCurrentFeed() ? '?feed=' + encodeURIComponent(getCurrentFeed()) : ''));
        let data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to load');

        const curFeed = getCurrentFeed();
        if (curFeed && Array.isArray(data)) {
          data = data.filter(function (b) { return (b.feed || '') === curFeed; });
        }

        if (!data.length) {
          const msg = curFeed
            ? 'No posts in this feed yet.'
            : 'No posts yet. The first one will appear after the next Friday run.';
          el.innerHTML = '<div class="empty">' + escapeHtml(msg) + '</div>';
          if (heading) heading.style.display = 'none';
          return;
        }
        if (heading) {
          heading.style.display = 'block';
          const cur = getCurrentFeed();
          heading.textContent = cur ? (cur === 'generic' ? 'Generic feed' : cur + ' feed') : 'Posts';
        }
        if (document.title) {
          const cur = getCurrentFeed();
          document.title = cur ? (cur === 'generic' ? 'Generic feed' : cur + ' feed') + ' – Dev Log' : 'Dev Log – Public Blog';
        }
        el.innerHTML = '<div class="posts-grid">' + data.map((b, i) => {
          const id = (b.id || '').replace(/-/g, '');
          const feedSlug = b.feed || '';
          const borderColor = colorForFeed(feedSlug, i);
          const feedLabel = feedSlug === 'generic' ? 'Generic' : feedSlug;
          return `
          <a href="/post/${id}" class="blog-card" data-feed="${escapeHtml(feedSlug)}" style="border-color: ${borderColor}; border-left-color: ${borderColor};">
            <div class="title">${escapeHtml(b.title)}</div>
            <div class="date">${formatDate(b.created_time)}</div>
            ${feedSlug ? '<div class="feed-tag" style="color: ' + borderColor + '">' + escapeHtml(feedLabel) + '</div>' : ''}
          </a>`;
        }).join('') + '</div>';
      } catch (err) {
        el.innerHTML = '<div class="error">Could not load posts. ' + escapeHtml(err.message) + '</div>';
        if (heading) heading.style.display = 'none';
      }
    }
    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }
    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    async function initFeeds() {
      const sel = document.getElementById('feed-select');
      const grid = document.getElementById('feeds-grid');
      const section = document.getElementById('feeds-section');
      try {
        const res = await fetch(base() + '/api/feeds');
        const { feeds } = await res.json();
        if (Array.isArray(feeds) && feeds.length > 0 && grid) {
          const currentFeed = feedFromUrl();
          const allCard = '<a href="' + window.location.pathname + '" class="feed-card" style="border-color: var(--border);' + (!currentFeed ? ' box-shadow: 0 0 0 2px var(--accent);' : '') + '" title="View all posts"><span class="feed-name">All</span><span class="feed-meta">All feeds</span></a>';
          grid.innerHTML = allCard + feeds.map((f, i) => {
            const label = f === 'generic' ? 'Generic' : f.split('/').pop() || f;
            const isActive = currentFeed === f;
            const color = colorForFeed(f, i);
            const href = '?' + new URLSearchParams({ feed: f }).toString();
            return `
            <a href="${href}" class="feed-card" style="border-color: ${color}; ${isActive ? 'box-shadow: 0 0 0 2px ' + color + ';' : ''}" title="View ${label} feed">
              <span class="feed-name">${escapeHtml(label)}</span>
              <span class="feed-meta">${f === 'generic' ? 'All repos' : 'Repo'}</span>
            </a>`;
          }).join('');

          if (sel) {
            while (sel.options.length > 1) sel.remove(1);
            feeds.forEach(f => {
              const opt = document.createElement('option');
              opt.value = f;
              opt.textContent = f === 'generic' ? 'Generic (all repos)' : f;
              sel.appendChild(opt);
            });
            if (currentFeed && feeds.includes(currentFeed)) sel.value = currentFeed;
            else if (!currentFeed) sel.value = '';

            if (!sel.dataset.feedListener) {
              sel.dataset.feedListener = '1';
              sel.addEventListener('change', () => {
                const f = sel.value;
                const params = new URLSearchParams(window.location.search);
                if (f) params.set('feed', f); else params.delete('feed');
                const url = params.toString() ? '?' + params : window.location.pathname;
                history.replaceState(null, '', url);
                const rss = document.getElementById('rss-anchor');
                const rssLink = document.getElementById('rss-link');
                const href = '/api/feed' + (f ? '?feed=' + encodeURIComponent(f) : '');
                if (rss) rss.href = href;
                if (rssLink) rssLink.href = href;
                initFeeds();
                load();
              });
            }

            const rssHref = '/api/feed' + (getCurrentFeed() ? '?feed=' + encodeURIComponent(getCurrentFeed()) : '');
            const rssAnchor = document.getElementById('rss-anchor');
            const rssLink = document.getElementById('rss-link');
            if (rssAnchor) rssAnchor.href = rssHref;
            if (rssLink) rssLink.href = rssHref;
          }
        }
        if (section && (!feeds || feeds.length === 0)) section.style.display = 'none';
      } catch (_) {
        if (section) section.style.display = 'none';
      }
    }

    (async () => {
      await initFeeds();
      load();
    })();
  </script>
</body>
</html>
